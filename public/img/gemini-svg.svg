<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Fondo Rojo exacto del logo -->
  <rect width="100%" height="100%" fill="#A51C21"/>
  
  <!-- "Carnes" en tipografía cursiva -->
  <text x="340" y="210" font-family="'Brush Script MT', 'Lucida Handwriting', cursive" font-size="95" fill="#ffffff" text-anchor="end">Carnes</text>
  
  <!-- "SANTA FÉ" en tipografía serif -->
  <text x="360" y="210" font-family="'Georgia', 'Times New Roman', serif" font-size="70" font-weight="bold" fill="#ffffff" text-anchor="start">SANTA FÉ</text>
  
  <!-- "SINCE" -->
  <text x="380" y="255" font-family="'Arial', sans-serif" font-size="16" font-weight="bold" fill="#ffffff" letter-spacing="4" text-anchor="end">SINCE</text>
  
  <!-- Rombo Central con iniciales -->
  <g transform="translate(420, 250)">
    <polygon points="0,-14 20,0 0,14 -20,0" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-14" y="-7" width="28" height="14" fill="#A51C21" stroke="#ffffff" stroke-width="1"/>
    <text x="0" y="4" font-family="'Arial', sans-serif" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">CSF</text>
  </g>

  <!-- "1952" -->
  <text x="460" y="255" font-family="'Arial', sans-serif" font-size="16" font-weight="bold" fill="#ffffff" letter-spacing="4" text-anchor="start">1952</text>
</svg>
